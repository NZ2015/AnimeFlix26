<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Lecteur AnimeFlix26</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="top-bar">
    <h1>AnimeFlix26</h1>
    <a href="index.html">⬅ Retour</a>
</header>

<div class="player-container">

    <h2>Naruto - Épisode 1</h2>

    <video controls class="video-player">
        <source src="naruto-episode1.mp4" type="video/mp4">
        Votre navigateur ne supporte pas la vidéo.
    </video>

    <div class="episode-list">
        <a href="player.html">EP 1</a>
        <a href="player2.html">EP 2</a>
        <a href="player3.html">EP 3</a>
    </div>

</div>

<script>
const episodes = [
    "naruto-episode1.mp4",
    "naruto-episode2.mp4",
    "naruto-episode3.mp4"
];

let current = 0;

const video = document.getElementById("video");
const nextBtn = document.getElementById("nextBtn");

nextBtn.addEventListener("click", () => {
    current++;

    if (current >= episodes.length) {
        alert("Fin des épisodes !");
        current = 0;
    }

    video.src = episodes[current];
    video.play();
});
</script>
</body>
</html>
