<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>AnimeFlix26</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <img src="logo.png" alt="AnimeFlix26 Logo" width="120">
    <h1>🎬 AnimeFlix26</h1>
    <p>Regarde tes animes préférés</p>
</header>

<div class="search-container">
   <input type="text" id="search" placeholder="Rechercher un anime...">
</div>
<section class="grid">

   <div class="anime-card">
    <img src="naruto.jpg" alt="Naruto" width="150">
    <h3>Naruto</h3>
    <p>Ninja aventure</p>
    <a href="naruto.html">Voir</a>
</div>

  <div class="anime-card">
    <img src="onepiece.jpg" alt="Luffy" width="150">
    <h3>One Piece</h3>
    <p>aventure de pirates </p>
    <a href="onepiece.html">Voir</a>
</div> 

   <div class="anime-card">
    <img src="bluelock.jpg" alt="Rin" width="150">
    <h3>Blue Lock</h3>
    <p>football</p>
    <a href="bluelock.html">Voir</a>
</div>
    
<div class="anime-card">
  <img src="bleach.jpg" alt="Ichigo Kurosaki" width="150">
    <h3>Bleach</h3>
    <p>Combats</p>
    <a href="bleach.html">Voir</a>
</div>

    <div class="anime-card">
        <img src="attackontitan.jpg" alt="Eren Jeager" Width="150">
        <h3>Attack on titan</h3>
        <p>guerre devouverte</p>
        <a href="attackontitan.html">Voir</a>
    </div>

    
</section>

<a href="anime.mp4" download>
    Télécharger l'anime
</a>

<script>
const search = document.getElementById("search");

search.addEventListener("input", () => {
    const filter = search.value.toLowerCase();
    const cards = document.querySelectorAll(".anime-card");

    cards.forEach(card => {
        const title = card.querySelector("h3");
        const text = title ? title.textContent.toLowerCase() : "";

        card.style.display = text.includes(filter) ? "flex" : "none";
    });
});
</script>
<script src="script.js"><script>
</body>
</html>
