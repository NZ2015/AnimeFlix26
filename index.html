<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>AnimeFlix26</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <img src="logo.png" alt="AnimeFlix26 Logo" width="120">
    <h1>🎬 AnimeFlix26</h1>
    <p>Regarde tes animes préférés</p>
</header>

<input type="text" id="search" placeholder="Rechercher un anime...">

<section class="grid">

    <div class="anime-card">
        <img src="naruto.jpg" alt="Naruto" width="150">
        <h3>Naruto</h3>
        <p>Ninja aventure</p>
    </div>

    <div class="anime-card">
        <img src="nagi.jpg" alt="Nagi" width="150">
        <h3>Nagi</h3>
        <p>Blue Lock</p>
    </div>

    <div class="anime-card">
        <img src="luffy.jpg" alt="Luffy" width="150">
        <h3>Luffy</h3>
        <p>One Piece</p>
    </div>

</section>

<a href="anime.mp4" download>
    Télécharger l'anime
</a>

<script>
const search = document.getElementById("search");

search.addEventListener("input", () => {
    const filter = search.value.toLowerCase();
    const cards = document.querySelectorAll(".anime-cards");

    cards.forEach(card => {
        const title = card.querySelector("h3");

        if (!title) return;

        const animeName = title.textContent.toLowerCase();

        card.style.display =
            animeName.includes(filter) ? "block" : "none";
    });
});
</script>

</body>
</html>
